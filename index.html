<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLIXWEAR</title>

<style>
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden; /* no scrolling */
    }

    body {
        background-image: url("Home.jpeg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;

        /* Mobile fix: use viewport height instead of 100% */
        height: 100vh;

        opacity: 0;
        animation: fadeIn 2s ease-in forwards;
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }
</style>

</head>
<body>
</body>
</html>
