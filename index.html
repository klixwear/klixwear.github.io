<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLIXWEAR</title>

<style>
    /* Reset */
    html, body {
        margin: 0;
        padding: 0;
    }

    /* Prevent scrolling on all devices */
    html, body {
        height: 100%;
        overflow: hidden;
    }

    /* Mobile-safe full screen */
    body {
        background-image: url("Home.jpeg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;

        /* This is the mobile fix */
        min-height: 100vh;
        height: 100vh;
        max-height: 100vh;

        opacity: 0;
        animation: fadeIn 2s ease-in forwards;
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }
</style>

</head>
<body>
</body>
</html></body>
</html>
