<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLIXWEAR</title>

<style>
    /* Reset */
    html, body {
        margin: 0;
        padding: 0;
    }

    /* Prevent scrolling */
    html, body {
        height: 100%;
        overflow: hidden;
    }

    /* Banner styling */
    body {
        background-image: url("Home.jpeg");
        background-size: contain;        /* fit entire image on any screen */
        background-position: center;     /* center it perfectly */
        background-repeat: no-repeat;    /* no tiling */
        background-color: black;         /* fills empty space cleanly */

        /* Mobile-safe height */
        min-height: 100vh;
        height: 100vh;
        max-height: 100vh;

        /* Fade-in effect */
        opacity: 0;
        animation: fadeIn 2s ease-in forwards;
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }
</style>

</head>
